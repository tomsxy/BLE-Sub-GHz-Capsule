CONFIG_UART_CONSOLE=n
CONFIG_LOG=n

CONFIG_HEAP_MEM_POOL_SIZE=2048

CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_GATT_CLIENT=y

CONFIG_NRF_RPC_THREAD_STACK_SIZE=2048


#
# Copyright (c) 2021 Nordic Semiconductor
